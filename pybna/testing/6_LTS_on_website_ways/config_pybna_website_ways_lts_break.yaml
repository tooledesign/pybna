#############################################
# Default configuration file for pyBNA
#
# Optional settings are commented out
# In general, optional parameters can be
# deduced through code so you'd only
# want to specify these if you have an
# unusual circumstance
#############################################
srid: 26916
units: mi # units for speed limit, either km (metric) or mi (imperial), default is "mi" if not given

db:
    user: "gis"
    password: "gis"
    host: "192.168.60.220"
    dbname: "bna"

bna:
    boundary:
        table: "received.neighborhood_boundary" # tables are optionally schema-qualified
        geom: "geom"

    blocks:
        table: "received.website_neighborhood_census_blocks"
        uid: "blockid10"
        population: "pop10"
        geom: "geom"
        roads_tolerance: 15     # determines whether a road is considered "connected" to a block
        min_road_length: 30     # determines whether a road is considered "connected" to a block

    network:
        roads:
            table: "automated.website_pybna_lts_neighborhood_ways_break" #used throughout bna, including stress module
            geom: "geom"
            uid: "id"
            source_column: "intersection_from"
            target_column: "intersection_to"
            oneway: {name: "one_way", forward: "ft", backward: "tf"}
            stress:
                segment:
                    forward: ft_seg_stress_pybna # added new columns to compare against old scores
                    backward: tf_seg_stress_pybna # these are where stress scores are placed, will overwrite
                crossing:
                    forward: ft_cross_stress_pybna
                    backward: tf_cross_stress_pybna
        intersections:
            table: "automated.rebuilt_website_ints" #these are the intersections used in the BNA
            geom: "geom"
            uid: "id"
            cluster_distance: 5
        edges:
            table: "website_net_edge"  #force_net_build = True will replace this table.
            source_column: "source_node"
            target_column: "target_node"
            stress_column: "edge_stress"
            cost_column: "edge_cost"
            id_column: edge_id
        nodes:
            table: "website_net_node" #force_net_build  = True will replace this as well.
            id_column: node_id

    connectivity:
        table: "website_connected_census_blocks_second_matrix" #this is the connectivity output table
        source_column: "source_blockid10"                      # origin in origin-destination pair
        target_column: "target_blockid10"                      # destinatino in o-d pair
        max_distance: 2680                                     # max detour distance
        max_detour: 25                                         # max detour percentage, given as a whole number percentage (i.e. 25 == 25%)
        detour_agnostic_threshold: 400                         # under this distance, detour is ignored
        max_stress: 2                                          # max lts value to consider, 'low stress'

    destinations:
      - name: people
        weight: 15
        table: received.website_neighborhood_census_blocks
        method: percentage
        datafield: pop10
        maxpoints: 100
        breaks: {0.03: 10, 0.2: 40, 0.5: 80}
        uid: blockid10
        # filter: "filter language here"
      - name: opportunity
        weight: 20
        subcats:
          # - name: employment
          #   weight: 35
          #   table: neighborhood_census_block_jobs
          #   method: percentage
          #   datafield: jobs
          #   maxpoints: 100
          #   breaks: {0.03: 10, 0.2: 40, 0.5: 80}
          #   uid: blockid10
          - name: schools
            weight: 35
            table: bna_schools
            method: count
            maxpoints: 100
            breaks: {1: 30, 2: 20, 3: 20}
            uid: id
            geom: geom_pt
            osm_tags_query:
                - "['amenity'='school']"
          - name: colleges
            weight: 10
            table: bna_colleges
            method: count
            maxpoints: 100
            breaks: {1: 70}
            uid: id
            geom: geom_pt
            osm_tags_query:
                - "['amenity'='college']"
          - name: universities
            weight: 20
            table: bna_universities
            method: count
            maxpoints: 100
            breaks: {1: 70}
            uid: id
            geom: geom_pt
            osm_tags_query:
                - "['amenity'='university']"
      - name: core_services
        weight: 20
        subcats:
          - name: doctors
            weight: 20
            table: bna_doctors
            method: count
            maxpoints: 100
            breaks: {1: 40, 2: 20, 3: 10}
            uid: id
            geom: geom_pt
            osm_tags_query:
                - "['amenity'='doctors']"
                - "['amenity'='doctor']"
                - "['amenity'='clinic']"
          - name: dentists
            weight: 10
            table: bna_dentists
            method: count
            maxpoints: 100
            breaks: {1: 40, 2: 20, 3: 10}
            uid: id
            geom: geom_pt
            osm_tags_query:
                - "['amenity'='dentist']"
          - name: hospitals
            weight: 20
            table: bna_hospitals
            method: count
            maxpoints: 100
            breaks: {1: 70}
            uid: id
            geom: geom_pt
            osm_tags_query:
                - "['amenity'='hospital']"
                - "['amenity'='hospitals']"
          - name: pharmacies
            weight: 10
            table: bna_pharmacies
            method: count
            maxpoints: 100
            breaks: {1: 40, 2: 20, 3: 10}
            uid: id
            geom: geom_pt
            osm_tags_query:
                - "['amenity'='pharmacy']"
          - name: supermarkets
            weight: 25
            table: bna_supermarkets
            method: count
            maxpoints: 100
            breaks: {1: 60, 2: 20}
            uid: id
            geom: geom_pt
            osm_tags_query:
                - "['shop'='supermarket']"
          - name: social_services
            weight: 15
            table: bna_social_services
            method: count
            maxpoints: 100
            breaks: {1: 70}
            uid: id
            geom: geom_pt
            osm_tags_query:
                - "['amenity'='social_facility']"
      - name: recreation
        weight: 15
        subcats:
          - name: parks
            weight: 40
            table: bna_parks
            method: count
            maxpoints: 100
            breaks: {1: 30, 2: 20, 3: 20}
            uid: id
            geom: geom_pt
            osm_tags_query:
                - "['amenity'='park']"
                - "['leisure'='park']"
                - "['leisure'='nature_reserve']"
                - "['leisure'='playground']"
        #   - name: trails
        #     weight: 35
        #     table: bna_paths
        #     method: count
        #     maxpoints: 100
        #     breaks: {1: 70, 2: 20}
        #     method: trails
          - name: community_centers
            weight: 25
            table: bna_community_centers
            method: count
            maxpoints: 100
            breaks: {1: 40, 2: 20, 3: 10}
            uid: id
            geom: geom_pt
            osm_tags_query:
                - "['amenity'='community_centre']"
                - "['amenity'='community_center']"
      - name: retail
        weight: 15
        table: bna_retail
        method: count
        maxpoints: 100
        breaks: {1: 40, 2: 20, 3: 10}
        uid: id
        geom: geom_pt
        osm_tags_query:
            - "['landuse'='retail']"
            - "['building'='retail']"
      - name: transit
        weight: 15
        table: bna_transit
        method: count
        maxpoints: 100
        breaks: {1: 60}
        uid: id
        geom: geom_pt
        osm_tags_query:
            - "['amenity'='bus_station']"
            - "['railway'='station']"
            - "['public_transport'='station']"

stress:
    lookup_tables:
        shared: "generated.stress_shared"           #these are the LTS values for shared streets
        bike_lane: "generated.stress_bike_lane"     # these are the LTS values for bike lanes
        crossing: "generated.stress_crossing"       # these are the potential LTS values on crossings

    segment:
        forward:
            lanes: ft_lanes
            oneway: {name: "one_way", val: "ft"}    # given as a pair (column_name, value)
            # aadt: aadt                            # comment out where aadt does not exist and assumptions need to be made
            # centerline: {name: "centerline", val: 1}  # given as a pair (column_name, value)
            speed: speed_limi
            parking: {name: "ft_park", val: true}
            parking_width: ft_park_width
            bike_infra: {name: "ft_bike_in", lane: "lane", buffered_lane: "buffered_lane", track: "track", path: "path"}
            bike_lane_width: ft_bike_01
        backward:
            lanes: tf_lanes
            oneway: {name: "one_way", val: "tf"}
            speed: speed_limi
            parking: {name: "tf_park", val: true}
            parking_width: tf_park_width
            bike_infra: {name: "tf_bike_in", lane: "lane", buffered_lane: "buffered_lane", track: "track", path: "path"}
            bike_lane_width: tf_bike_01

    crossing:
        intersection_tolerance: 5
        control:
            # control is required
            table: automated.rebuilt_website_ints
            geom: geom
            column:
                name: "control"
                four_way_stop: "stop"
                signal: "signal"
                rrfb: "rrfb"
                hawk: "hawk"
        island:
            table: automated.rebuilt_website_ints
            geom: geom
            column:
                name: "island"
                value: True
        forward:
            # lanes: ft_cross_lanes
            # speed: ft_speed_limit
            # control: ft_control
            # island: ft_island
        backward:
            # lanes: tf_cross_lanes
            # speed: tf_speed_limit
            # control: tf_control
            # island: tf_island

    assumptions:
        # These are assumptions we make to cover holes in the data. Assumptions
        # must match one of the values in a stress target.
        # Assumptions are entered as a where clause and a value. Note that each
        # clause is entered as a list item (with a dash)
        # An "else" statement can be included at the end if desired
        # A "*" matches everything (i.e. applied universally)
        segment:
            lanes:
                - where: "functional IN ('primary','secondary')"
                  val: 2
                - where: "functional IN ('tertiary')"
                  val: 1
                - else: 1
            speed:
                - where: "functional IN ('primary','secondary')"
                  val: 40
                - where: "functional = 'tertiary'"
                  val: 30
                - where: "functional IN ('unclassified','residential')"
                  val: 25
                - else: 30
            parking:
                - where: "*"
                  val: TRUE
            parking_width:
                - where: "functional IN ('primary','secondary', 'tertiary')"
                  val: 8
                - else: 0
            bike_lane_width:
                - where: "functional IN ('primary','secondary', 'tertiary') AND ft_bike_in = 'buffered_lane'"
                  val: 6
                - where: "functional IN ('primary','secondary', 'tertiary') AND tf_bike_in = 'buffered_lane'"
                  val: 6
                - where: "functional IN ('primary','secondary', 'tertiary') AND ft_bike_in = 'bike_lane' AND ft_park = TRUE"
                  val: 5
                - where: "functional IN ('primary','secondary', 'tertiary') AND ft_bike_in = 'bike_lane' AND ft_park = FALSE"
                  val: 4
                - where: "functional IN ('primary','secondary', 'tertiary') AND tf_bike_in = 'bike_lane' AND tf_park = TRUE"
                  val: 5
                - where: "functional IN ('primary','secondary', 'tertiary') AND tf_bike_in = 'bike_lane' AND tf_park = FALSE"
                  val: 4
                - else: 5
            centerline:
                - where: "functional IN ('primary','secondary','tertiary')"
                  val: True
                - else: False
            aadt:
                - where: "functional IN ('primary','secondary')"
                  val: 20000
                - where: "functional = 'tertiary'"
                  val: 10000
                - where: "functional IN ('unclassified','residential')"
                  val: 500
                - else: 20000

        crossing:
            priority:
                # This section allows us to define priority rules that assume
                # a crossing is low stress because it is given priority (i.e.
                # doesn't yield to cross traffic) or because it is assumed to
                # be signal-controlled
                #   where: matches the streets where the score should be applied.
                #   meets: this is used to match the cross streets, if a match
                #       is found priority is given. A * matches everything.
                - where: "functional = 'primary'"
                  meets: "*"
                - where: "functional = 'secondary'"
                  meets: "*"
                - where: "functional = 'tertiary'"
                  meets: "functional IN ('residential','unclassified')"
